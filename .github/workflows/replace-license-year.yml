# Automatically updates the license year to the current year
# when a new repository is generated from this template.
---
name: Replace License Year Action

on:
  push:
    branches:
      - main

jobs:
  init:
    # Runs ONLY if the current repository is NOT a template
    if: github.event.repository.is_template == false
    runs-on: ubuntu-slim
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Replace license year variable, delete this workflow, commit & push
        run: |
          # Assign user: GitHub Actions [bot]
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Replace year variable in any common license file
          CURRENT_YEAR=$(date +'%Y')
          
          # Enable case-insensitive and null globbing so it doesn't crash if files are missing
          shopt -s nocaseglob nullglob
          
          # Loop through common license filenames
          for file in LICENSE* COPYING*; do
            if [ -f "$file" ]; then
              sed -i "s/{{YEAR}}/$CURRENT_YEAR/g" "$file"
              git add "$file"
            fi
          done

          # Clean up the caller workflow
          WORKFLOW_FILE_PATH="${{ job.workflow_file_path }}"
          git rm "$WORKFLOW_FILE_PATH"

          # Remove parent directories of caller workflow if empty
          TARGET_DIR=$(dirname "$WORKFLOW_FILE_PATH")
          while [ "$TARGET_DIR" != "." ] && [ "$TARGET_DIR" != "/" ]; do
            # Try to remove the directory. rmdir natively fails if it is not empty.
            if rmdir "$TARGET_DIR" 2>/dev/null; then
              # If successful, move up one level to the parent directory
              TARGET_DIR=$(dirname "$TARGET_DIR")
            else
              # If rmdir fails (directory not empty), break out of the loop
              break
            fi
          done

          # Commit and Push
          git commit -m "chore: setup license year and clean repository [skip ci]"
          git push
